// ---------- CSV parsing (simple, comma or semicolon) ----------
function parseCSV(text){
  const sep = text.split('\n')[0].includes(';') ? ';' : ',';
  const lines = text.split(/\r?\n/).filter(l => l.trim().length);
  const headers = lines[0].split(sep).map(h => h.trim().toLowerCase());
  return lines.slice(1).map(line => {
    const cells = line.split(sep).map(c => c.trim());
    const row = {};
    headers.forEach((h,i) => row[h] = cells[i] ?? '');
    return row;
  });
}

// ---------- Small UI atoms ----------
function Pill({children, tone='default'}){
  const tones = {
    default: {bg:'#e3e7f0', fg:'var(--ink)'},
    ok: {bg:'#dce2f0', fg:'var(--moss-dark)'},
    warn: {bg:'#f6dccb', fg:'var(--warn)'},
    signal: {bg:'var(--signal-soft)', fg:'#7a3414'},
  };
  const t = tones[tone] || tones.default;
  return <span style={{
    display:'inline-block', padding:'2px 10px', borderRadius:99,
    fontSize:12, fontWeight:600, letterSpacing:'.02em',
    background:t.bg, color:t.fg
  }}>{children}</span>;
}

function Button({children, onClick, variant='primary', disabled, style, type='button'}){
  const base = {
    fontFamily:'var(--body)', fontWeight:600, fontSize:14,
    padding:'10px 18px', borderRadius:8, border:'1px solid transparent',
    cursor: disabled ? 'not-allowed':'pointer', opacity: disabled?0.5:1,
    transition:'transform .08s ease',
  };
  const variants = {
    primary: {background:'var(--moss)', color:'#fff'},
    signal: {background:'var(--signal)', color:'#fff'},
    ghost: {background:'transparent', color:'var(--moss-dark)', border:'1px solid var(--line)'},
    danger: {background:'transparent', color:'var(--warn)', border:'1px solid var(--warn)'},
  };
  return <button type={type} disabled={disabled} onClick={onClick}
    onMouseDown={e=>e.currentTarget.style.transform='scale(0.97)'}
    onMouseUp={e=>e.currentTarget.style.transform='scale(1)'}
    style={{...base, ...variants[variant], ...style}}>{children}</button>;
}

function Field({label, children}){
  return (
    <label style={{display:'block', marginBottom:14}}>
      <div style={{fontSize:12, fontWeight:600, color:'var(--moss-dark)', marginBottom:5, textTransform:'uppercase', letterSpacing:'.05em'}}>{label}</div>
      {children}
    </label>
  );
}

const inputStyle = {
  width:'100%', padding:'9px 12px', borderRadius:7, border:'1px solid var(--line)',
  fontSize:15, fontFamily:'var(--body)', background:'#fff', color:'var(--ink)'
};

function Card({children, style}){
  return <div style={{background:'var(--card)', border:'1px solid var(--line)', borderRadius:12, padding:20, ...style}}>{children}</div>;
}

function Checkbox({checked, onChange, label}){
  return (
    <label style={{display:'flex', alignItems:'center', gap:8, cursor:'pointer', fontSize:14}}>
      <input type="checkbox" checked={checked} onChange={e=>onChange(e.target.checked)}
        style={{width:16, height:16, accentColor:'var(--moss)'}} />
      {label}
    </label>
  );
}

// ---------- Lock-scherm voor gevoelige tabbladen (Edit, Data) ----------
// Let op: dit is geen echte beveiliging, de code staat in de broncode van deze pagina.
// Het is een drempel tegen per ongeluk aanpassen, niet tegen iemand die het bestand zelf opent.
function LockedTab({children}){
  const [unlocked, setUnlocked] = useState(false);
  const [code, setCode] = useState('');
  const [fout, setFout] = useState(false);

  if(unlocked) return children;

  const handleSubmit = () => {
    if(code === LOCK_CODE){ setUnlocked(true); setFout(false); }
    else { setFout(true); }
  };

  return (
    <div style={{display:'flex', justifyContent:'center', paddingTop:60}}>
      <Card style={{maxWidth:320, width:'100%', textAlign:'center'}}>
        <h3 style={{marginTop:0, fontFamily:'var(--display)'}}>Toegangscode vereist</h3>
        <p style={{fontSize:13.5, color:'#5a5645'}}>Dit tabblad is vergrendeld om per ongeluk aanpassen te voorkomen.</p>
        <input
          type="password" inputMode="numeric" autoFocus
          style={{...inputStyle, textAlign:'center', fontSize:18, letterSpacing:'0.2em', marginBottom:10}}
          value={code} onChange={e=>{ setCode(e.target.value); setFout(false); }}
          onKeyDown={e=>{ if(e.key==='Enter'){ e.preventDefault(); handleSubmit(); } }}
          placeholder="Code"
        />
        {fout && <div style={{fontSize:13, color:'var(--warn)', marginBottom:10}}>Onjuiste code.</div>}
        <Button onClick={handleSubmit}>Ontgrendelen</Button>
      </Card>
    </div>
  );
}

function App(){
  const [state, setState] = useState(emptyState);
  const [tab, setTab] = useState('balie');
  const [ingelogd, setIngelogd] = useState(false);
  const [started, setStarted] = useState(false);
  const [printData, setPrintData] = useState(null);
  const [printerActief, setPrinterActief] = useState(true);

  // ---- derived lookups ----
  const positieById = useMemo(() => Object.fromEntries(state.posities.map(p=>[p.id,p])), [state.posities]);
  const werknemerById = useMemo(() => Object.fromEntries(state.werknemers.map(v=>[v.id,v])), [state.werknemers]);

  const checkinByIndelingId = useMemo(() => {
    const m = {};
    state.checkins.forEach(c => { m[c.indelingId] = c; });
    return m;
  }, [state.checkins]);

  // ---- mutations ----
  const update = (fn) => setState(prev => fn(structuredClone(prev)));

  const addPositie = (naam, sectie, uniform, vereistPortofoon, plakdienst, leidinggevende) => update(s => {
    s.posities.push({id:uid('pos'), naam, sectie, uniform: uniform||[], vereistPortofoon: !!vereistPortofoon, plakdienst: !!plakdienst, leidinggevende: !!leidinggevende, materiaal:[]});
    return s;
  });
  const updatePositie = (id, patch) => update(s => {
    const p = s.posities.find(p=>p.id===id);
    if(p) Object.assign(p, patch);
    return s;
  });
  const removePositie = (id) => update(s => {
    s.posities = s.posities.filter(p=>p.id!==id);
    s.indelingen = s.indelingen.filter(i=>i.positieId!==id);
    return s;
  });
  const addMateriaalRegel = (positieId, naam, aantal) => update(s => {
    const p = s.posities.find(p=>p.id===positieId);
    if(p) p.materiaal.push({naam, aantal: Number(aantal)||1});
    return s;
  });
  const removeMateriaalRegel = (positieId, idx) => update(s => {
    const p = s.posities.find(p=>p.id===positieId);
    if(p) p.materiaal.splice(idx,1);
    return s;
  });

  const importPosities = (rows) => update(s => {
    rows.forEach(r => {
      const naam = r.naam || r.name;
      if(!naam) return;
      const sectie = r.sectie || '';
      const uniformRaw = r.uniform || '';
      const uniform = uniformRaw.split(/[|,]/).map(u=>u.trim()).filter(Boolean)
        .map(u => UNIFORM_OPTIES.find(o => o.toLowerCase()===u.toLowerCase()) || u);
      let p = s.posities.find(p => p.naam.toLowerCase()===naam.toLowerCase() && p.sectie.toLowerCase()===sectie.toLowerCase());
      const portofoonRaw = (r.portofoon || r.vereistportofoon || '').toLowerCase();
      const vereistPortofoon = ['ja','yes','1','true','x'].includes(portofoonRaw);
      const plakdienstRaw = (r.plakdienst || '').toLowerCase();
      const plakdienst = ['ja','yes','1','true','x'].includes(plakdienstRaw);
      const leidinggevendeRaw = (r.leidinggevende || '').toLowerCase();
      const leidinggevende = ['ja','yes','1','true','x'].includes(leidinggevendeRaw);
      if(!p){ p = {id:uid('pos'), naam, sectie, uniform, vereistPortofoon, plakdienst, leidinggevende, materiaal:[]}; s.posities.push(p); }
      else {
        p.uniform = uniform.length ? uniform : p.uniform;
        if(r.portofoon || r.vereistportofoon) p.vereistPortofoon = vereistPortofoon;
        if(r.plakdienst) p.plakdienst = plakdienst;
        if(r.leidinggevende) p.leidinggevende = leidinggevende;
      }
      // optioneel materiaal kolom: "materiaal" met "naam:aantal|naam:aantal"
      if(r.materiaal){
        r.materiaal.split('|').forEach(part => {
          const [mnaam, maantal] = part.split(':').map(x=>x && x.trim());
          if(mnaam) p.materiaal.push({naam:mnaam, aantal: Number(maantal)||1});
        });
      }
    });
    return s;
  });

  const naamBestaatAl = (lijst, naam, ignoreId) => lijst.some(x => x.naam.trim().toLowerCase()===naam.trim().toLowerCase() && x.id!==ignoreId);

  const addWerknemer = (naam, beveiligingspas, organisatie) => {
    let error = null;
    update(s => {
      if(naamBestaatAl(s.werknemers, naam)){
        error = `Er bestaat al een werknemer met de naam "${naam}".`;
        return s;
      }
      s.werknemers.push({id:uid('wn'), naam, beveiligingspas: !!beveiligingspas, organisatie: organisatie || ''});
      return s;
    });
    return error;
  };
  const updateWerknemer = (id, patch) => {
    let error = null;
    update(s => {
      if(patch.naam && naamBestaatAl(s.werknemers, patch.naam, id)){
        error = `Er bestaat al een werknemer met de naam "${patch.naam}".`;
        return s;
      }
      const w = s.werknemers.find(w=>w.id===id);
      if(w) Object.assign(w, patch);
      return s;
    });
    return error;
  };
  const removeWerknemer = (id) => update(s => {
    s.werknemers = s.werknemers.filter(v=>v.id!==id);
    s.indelingen = s.indelingen.filter(i=>i.werknemerId!==id);
    return s;
  });
  const importWerknemers = (rows) => update(s => {
    rows.forEach(r => {
      const naam = r.naam || r.name;
      if(!naam) return;
      if(naamBestaatAl(s.werknemers, naam)) return; // skip duplicaten stilletjes bij import
      const pasRaw = (r.beveiligingspas || r.pas || '').toLowerCase();
      const pas = ['ja','yes','1','true','x'].includes(pasRaw);
      s.werknemers.push({id:uid('wn'), naam, beveiligingspas: pas, organisatie: r.organisatie || ''});
    });
    return s;
  });

  // Geeft een waarschuwingstekst terug als de werknemer geen beveiligingspas heeft
  // én de positie een ander uniform vereist dan uitsluitend Crowd Support. Geen harde blokkade.
  const checkBeveiligingspasWaarschuwing = (positie, werknemer) => {
    if(!positie || !werknemer) return null;
    if(werknemer.beveiligingspas) return null;
    const uniform = positie.uniform || [];
    const alleenCrowdSupport = uniform.length > 0 && uniform.every(u => u === 'Crowd Support');
    if(uniform.length === 0 || alleenCrowdSupport) return null;
    return `${werknemer.naam} heeft geen beveiligingspas, maar wordt ingedeeld op "${positie.naam}" (uniform: ${uniform.join(', ')}). Dit is normaliter alleen toegestaan voor Crowd Support.`;
  };

  const addIndeling = (positieId, werknemerId) => {
    let error = null;
    update(s => {
      const positie = s.posities.find(p=>p.id===positieId);
      const exists = s.indelingen.some(i=>i.positieId===positieId && i.werknemerId===werknemerId);
      if(exists){ error = 'Deze werknemer is al gekoppeld aan deze positie.'; return s; }
      if(!positie?.plakdienst){
        const bezet = s.indelingen.some(i=>i.positieId===positieId);
        if(bezet){ error = 'Deze positie is al bezet door iemand anders. Vink \'Plakdienst\' aan bij de positie als hier meerdere mensen tegelijk op mogen staan.'; return s; }
      }
      s.indelingen.push({id:uid('ind'), positieId, werknemerId});
      return s;
    });
    return error;
  };
  const updateIndeling = (id, patch) => update(s => {
    const i = s.indelingen.find(i=>i.id===id);
    if(i) Object.assign(i, patch);
    return s;
  });
  const removeIndeling = (id) => update(s => {
    s.indelingen = s.indelingen.filter(i=>i.id!==id);
    s.checkins = s.checkins.filter(c=>c.indelingId!==id);
    return s;
  });

  const ensureCheckin = (s, indelingId) => {
    let c = s.checkins.find(c=>c.indelingId===indelingId);
    if(!c){
      c = {id:uid('ci'), indelingId, status:'gepland', inTijd:null, uitTijd:null, materiaalUitgegeven:[]};
      s.checkins.push(c);
    }
    return c;
  };

  const checkIn = (indelingId, materiaalOverride, inTijdOverride) => {
    let snapshot = null;
    update(s => {
      const c = ensureCheckin(s, indelingId);
      c.status = 'ingecheckt';
      c.inTijd = inTijdOverride || nowTime();
      const indeling = s.indelingen.find(i=>i.id===indelingId);
      const positie = s.posities.find(p=>p.id===indeling.positieId);
      const bron = materiaalOverride || positie.materiaal;
      // Elk materiaal-item krijgt een eigen 'ingeleverd'-vlag, los van de incheck/uitcheck-status,
      // zodat losse items na uitchecken nog apart als ingeleverd gemarkeerd kunnen worden.
      c.materiaalUitgegeven = bron.map(m=>({naam:m.naam, aantal:m.aantal, ingeleverd:false}));
      const werknemer = s.werknemers.find(w=>w.id===indeling.werknemerId);
      snapshot = {
        werknemer, positie, inTijd:c.inTijd,
        materiaal: c.materiaalUitgegeven,
        event: s.event,
      };
      return s;
    });
    return snapshot;
  };

  const updateMateriaalUitgegeven = (indelingId, materiaal) => update(s => {
    const c = ensureCheckin(s, indelingId);
    c.materiaalUitgegeven = materiaal.map(m=>({ingeleverd:false, ...m}));
    return s;
  });

  // ingeleverdNamen: Set van materiaalnamen (lowercase) die bij het afmelden als ingeleverd zijn aangevinkt.
  // Alles wat niet in die set zit, blijft op 'niet ingeleverd' staan en is dus zichtbaar in Openstaand materiaal.
  const checkOut = (indelingId, ingeleverdNamen, opmerking, uitTijdOverride) => update(s => {
    const c = ensureCheckin(s, indelingId);
    c.status = 'uitgecheckt';
    c.uitTijd = uitTijdOverride || nowTime();
    if(ingeleverdNamen && c.materiaalUitgegeven){
      c.materiaalUitgegeven = c.materiaalUitgegeven.map(m => ({
        ...m,
        ingeleverd: ingeleverdNamen.has(m.naam.toLowerCase())
      }));
    }
    if(opmerking !== undefined) c.opmerking = opmerking;
    return s;
  });

  // Markeert één los materiaal-item van een werknemer als (niet) ingeleverd.
  // Werkt ongeacht of de werknemer al is uitgecheckt, zodat dit ook achteraf vanuit
  // 'Openstaand materiaal' afgehandeld kan worden.
  const setMateriaalItemIngeleverd = (indelingId, itemIndex, ingeleverd) => update(s => {
    const c = s.checkins.find(c=>c.indelingId===indelingId);
    if(c && c.materiaalUitgegeven && c.materiaalUitgegeven[itemIndex]){
      c.materiaalUitgegeven[itemIndex] = {...c.materiaalUitgegeven[itemIndex], ingeleverd};
    }
    return s;
  });

  const markNoShow = (indelingId) => update(s => {
    const c = ensureCheckin(s, indelingId);
    c.status = 'no-show';
    return s;
  });

  const resetCheckin = (indelingId) => update(s => {
    s.checkins = s.checkins.filter(c=>c.indelingId!==indelingId);
    return s;
  });

  // ---- export / import full state ----
  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${state.event.name.replace(/\s+/g,'_')}_data.json`;
    a.click();
    URL.revokeObjectURL(url);
  };
  const importJSONFile = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if(!data.instellingen) data.instellingen = structuredClone(emptyState.instellingen);
        if(!data.instellingen.materiaalOpties) data.instellingen.materiaalOpties = [...DEFAULT_MATERIAAL_OPTIES];
        data.posities = (data.posities||[]).map(p => ({vereistPortofoon:false, plakdienst:false, leidinggevende:false, ...p}));
        data.werknemers = (data.werknemers||[]).map(w => ({organisatie:'', ...w}));
        setState(data);
      } catch(err){ alert('Kon bestand niet lezen: ' + err.message); }
    };
    reader.readAsText(file);
  };

  // ---- opslaan: handmatig via knop, en automatisch elke 5 minuten ----
  // Let op: er is geen server, dus 'opslaan' betekent hier dat de browser een .json-bestand
  // downloadt. De browser kan de eerste keer om toestemming vragen voor meerdere downloads.
  const [laatsteAutosave, setLaatsteAutosave] = useState(null);
  const stateRef = useRef(state);
  stateRef.current = state;

  const doSave = (label) => {
    const huidigeState = stateRef.current;
    const heeftData = huidigeState.posities.length > 0 || huidigeState.werknemers.length > 0 || huidigeState.indelingen.length > 0;
    if(!heeftData) return false;
    const blob = new Blob([JSON.stringify(huidigeState, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${huidigeState.event.name.replace(/\s+/g,'_')}_${label}_${nowTime().replace(':','-')}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setLaatsteAutosave(nowTime());
    return true;
  };

  const handmatigOpslaan = () => doSave('opslag');

  useEffect(() => {
    const interval = setInterval(() => { doSave('autosave'); }, 5 * 60 * 1000);
    return () => clearInterval(interval);
  }, []);

  // Waarschuwing bij het sluiten/verlaten van de pagina. Browsers staan geen eigen
  // JS-dialoogvenster (met 'Ja'/'Nee') toe op dit moment — alleen hun eigen generieke
  // waarschuwing. Daarom wordt hier altijd eerst automatisch een export gestart zodra
  // er data is, zodat er sowieso een back-up wordt gedownload vlak voor het sluiten,
  // en toont de browser daarnaast zijn eigen 'weet u het zeker?'-waarschuwing.
  useEffect(() => {
    const handler = (e) => {
      const huidigeState = stateRef.current;
      const heeftData = huidigeState.posities.length > 0 || huidigeState.werknemers.length > 0 || huidigeState.indelingen.length > 0;
      if(!heeftData) return;
      doSave('afsluiten');
      e.preventDefault();
      e.returnValue = '';
      return '';
    };
    window.addEventListener('beforeunload', handler);
    return () => window.removeEventListener('beforeunload', handler);
  }, []);

  // Print-aansturing zit nu in de Bonnetje component zelf (respecteert printerActief/autoPrint).

  const tabs = [
    {id:'balie', label:'Balie'},
    {id:'posities', label:'Posities & secties'},
    {id:'werknemers', label:'Werknemers'},
    {id:'indeling', label:'Indeling'},
    {id:'exports', label:'Exports'},
    {id:'edit', label:'Edit'},
    {id:'data', label:'Data'},
  ];

  if(!ingelogd){
    return <LoginScreen onSuccess={()=>setIngelogd(true)} />;
  }

  if(!started){
    return <StartScreen state={state} setState={setState} importJSONFile={importJSONFile}
      importPosities={importPosities} importWerknemers={importWerknemers}
      onStart={()=>{ setStarted(true); setTab('indeling'); }} />;
  }

  return (
    <div style={{minHeight:'100vh', display:'flex', flexDirection:'column'}}>
      <style>{`
        @media print {
          body * { visibility: hidden; }
          #bonnetje, #bonnetje * { visibility: visible; }
          #bonnetje { position: fixed; top:0; left:0; width: 80mm; }
        }
        input:focus, select:focus, button:focus { outline: 2px solid var(--signal); outline-offset:1px; }
      `}</style>

      <header style={{
        background:'var(--moss-dark)', color:'#fff', padding:'18px 28px',
        display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:12
      }}>
        <div style={{display:'flex', alignItems:'baseline', gap:14}}>
          <span style={{fontFamily:'var(--display)', fontSize:24, fontWeight:700, letterSpacing:'-0.01em'}}>Scorpions Security</span>
          <span style={{opacity:0.7, fontSize:13, fontFamily:'var(--mono)'}}>Personeelsindeling</span>
        </div>
        <div style={{display:'flex', alignItems:'center', gap:14, fontSize:13, fontFamily:'var(--mono)', opacity:0.85}}>
          <span>{state.event.name}</span>
          <span style={{opacity:0.5}}>·</span>
          <span>{state.event.date}</span>
          <Button variant="ghost" onClick={()=>setStarted(false)} style={{padding:'7px 14px', fontSize:13, color:'#fff', borderColor:'rgba(255,255,255,0.4)'}}>
            🏠 Startscherm
          </Button>
          <Button onClick={handmatigOpslaan} style={{padding:'7px 14px', fontSize:13}}>
            💾 Opslaan{laatsteAutosave ? ` (laatst ${laatsteAutosave})` : ''}
          </Button>
        </div>
      </header>

      <nav style={{
        display:'flex', gap:4, padding:'10px 24px', background:'#dde3ee',
        borderBottom:'1px solid var(--line)', overflowX:'auto'
      }}>
        {tabs.map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            padding:'8px 16px', borderRadius:7, border:'none', cursor:'pointer',
            fontWeight:600, fontSize:13.5, fontFamily:'var(--body)',
            background: tab===t.id ? 'var(--moss)' : 'transparent',
            color: tab===t.id ? '#fff' : 'var(--moss-dark)',
            whiteSpace:'nowrap',
          }}>{t.label}</button>
        ))}
      </nav>

      <main style={{flex:1, padding:'28px', maxWidth:1100, margin:'0 auto', width:'100%'}}>
        {tab==='balie' && <BalieTab state={state} positieById={positieById} werknemerById={werknemerById}
          checkinByIndelingId={checkinByIndelingId}
          checkIn={checkIn} checkOut={checkOut} markNoShow={markNoShow} resetCheckin={resetCheckin}
          setPrintData={setPrintData} printerActief={printerActief} setPrinterActief={setPrinterActief}
          setMateriaalItemIngeleverd={setMateriaalItemIngeleverd} />}
        {tab==='posities' && <PositiesTab posities={state.posities} addPositie={addPositie} updatePositie={updatePositie}
          removePositie={removePositie} addMateriaalRegel={addMateriaalRegel} removeMateriaalRegel={removeMateriaalRegel}
          importPosities={importPosities} />}
        {tab==='werknemers' && <WerknemersTab werknemers={state.werknemers} addWerknemer={addWerknemer}
          updateWerknemer={updateWerknemer} removeWerknemer={removeWerknemer} importWerknemers={importWerknemers} />}
        {tab==='indeling' && <IndelingTab state={state} addIndeling={addIndeling} updateIndeling={updateIndeling}
          removeIndeling={removeIndeling} positieById={positieById} werknemerById={werknemerById}
          checkBeveiligingspasWaarschuwing={checkBeveiligingspasWaarschuwing} />}
        {tab==='exports' && <ExportsTab state={state} positieById={positieById} werknemerById={werknemerById} />}
        {tab==='edit' && <LockedTab><EditTab instellingen={state.instellingen} setState={setState} /></LockedTab>}
        {tab==='data' && <LockedTab><DataTab state={state} setState={setState} exportJSON={exportJSON} importJSONFile={importJSONFile} laatsteAutosave={laatsteAutosave} /></LockedTab>}
      </main>

      {printData && <Bonnetje data={printData} autoPrint={printerActief} onClose={()=>setPrintData(null)} />}

      <footer style={{textAlign:'center', padding:'18px', fontSize:12, color:'#8a8472', fontFamily:'var(--mono)'}}>
        Lokale tool — data leeft alleen in deze sessie. Autosave elke 5 minuten{laatsteAutosave ? ` · laatste autosave ${laatsteAutosave}` : ' · nog niet gestart'}.
      </footer>
    </div>
  );
}

// ---------- Inlogscherm ----------
// Let op: dit is geen echte beveiliging, de code staat in de broncode van deze pagina
// (zie ook LockedTab hierboven). Het is een drempel, niet echte toegangscontrole.
function LoginScreen({onSuccess}){
  const [code, setCode] = useState('');
  const [fout, setFout] = useState(false);

  const handleSubmit = () => {
    if(code === LOCK_CODE) onSuccess();
    else { setFout(true); setCode(''); }
  };

  return (
    <div style={{minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:20, background:'var(--paper)'}}>
      <img src={LOGO_BASE64} style={{width:150, marginBottom:18}} alt="Scorpions Security" />
      <Card style={{maxWidth:340, width:'100%', textAlign:'center'}}>
        <h3 style={{marginTop:0, fontFamily:'var(--display)'}}>Inloggen</h3>
        <p style={{fontSize:13.5, color:'#5a5645'}}>Voer de toegangscode in om de personeelsindeling te openen.</p>
        <input
          type="password" inputMode="numeric" autoFocus
          style={{...inputStyle, textAlign:'center', fontSize:18, letterSpacing:'0.2em', marginBottom:10}}
          value={code} onChange={e=>{ setCode(e.target.value); setFout(false); }}
          onKeyDown={e=>{ if(e.key==='Enter'){ e.preventDefault(); handleSubmit(); } }}
          placeholder="Code"
        />
        {fout && <div style={{fontSize:13, color:'var(--warn)', marginBottom:10}}>Onjuiste code.</div>}
        <Button onClick={handleSubmit} style={{width:'100%'}}>Inloggen</Button>
      </Card>
    </div>
  );
}

// ---------- Startscherm ----------
function StartScreen({state, setState, importJSONFile, importPosities, importWerknemers, onStart}){
  const jsonFileRef = useRef(null);
  const [posBestanden, setPosBestanden] = useState([]);
  const [wnBestanden, setWnBestanden] = useState([]);

  const handleJSON = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    importJSONFile(file);
    e.target.value = '';
  };
  const handlePosCSV = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      importPosities(parseCSV(ev.target.result));
      setPosBestanden(prev => [...prev, file.name]);
    };
    reader.readAsText(file);
    e.target.value = '';
  };
  const handleWnCSV = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      importWerknemers(parseCSV(ev.target.result));
      setWnBestanden(prev => [...prev, file.name]);
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const nieuwEvenement = () => {
    if(confirm('Alle huidige gegevens (posities, werknemers, indelingen) wissen en met een leeg evenement beginnen?')){
      setState(structuredClone(emptyState));
      setPosBestanden([]); setWnBestanden([]);
    }
  };

  return (
    <div style={{minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', padding:'48px 20px 60px', background:'var(--paper)'}}>
      <img src={LOGO_BASE64} style={{width:150, marginBottom:10}} alt="Scorpions Security" />
      <h1 style={{fontFamily:'var(--display)', fontSize:30, margin:'4px 0 4px', color:'var(--moss-dark)'}}>Personeelsindeling</h1>
      <p style={{color:'#5a5645', marginTop:0, marginBottom:32, textAlign:'center', maxWidth:520}}>
        Laad een eerder opgeslagen evenement in, of begin een nieuw evenement en importeer direct je CSV-bestanden.
      </p>

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:20, width:'100%', maxWidth:920}}>
        <Card>
          <h3 style={{marginTop:0, fontFamily:'var(--display)'}}>1. Evenement</h3>
          <Field label="Evenement / wedstrijd">
            <input style={inputStyle} value={state.event.name} onChange={e=>setState(s=>({...s, event:{...s.event, name:e.target.value}}))} />
          </Field>
          <Field label="Datum">
            <input style={inputStyle} type="date" value={state.event.date} onChange={e=>setState(s=>({...s, event:{...s.event, date:e.target.value}}))} />
          </Field>
        </Card>

        <Card>
          <h3 style={{marginTop:0, fontFamily:'var(--display)'}}>Of: bestaand evenement laden</h3>
          <p style={{fontSize:13.5, color:'#5a5645'}}>
            Laad een eerder opgeslagen .json-bestand (export of autosave) om verder te gaan waar je gebleven was.
            Dit vervangt alle huidige gegevens hierboven.
          </p>
          <Button variant="ghost" onClick={()=>jsonFileRef.current.click()}>Bestand kiezen (.json)</Button>
          <input ref={jsonFileRef} type="file" accept=".json" style={{display:'none'}} onChange={handleJSON} />
        </Card>

        <Card>
          <h3 style={{marginTop:0, fontFamily:'var(--display)'}}>2. Posities importeren</h3>
          <div style={{fontSize:12.5, color:'#5a5645', marginBottom:8}}>
            CSV met kolommen: <strong>naam, sectie, uniform</strong>.<br/>
            Optioneel: <strong>portofoon, plakdienst, leidinggevende, materiaal</strong>.
          </div>
          <input type="file" accept=".csv" onChange={handlePosCSV} />
          <div style={{marginTop:10, fontSize:13.5}}>
            <strong>{state.posities.length}</strong> posities geladen
            {posBestanden.length>0 && <div style={{fontSize:12, color:'#8a8472'}}>{posBestanden.join(', ')}</div>}
          </div>
        </Card>

        <Card>
          <h3 style={{marginTop:0, fontFamily:'var(--display)'}}>3. Werknemers importeren</h3>
          <div style={{fontSize:12.5, color:'#5a5645', marginBottom:8}}>
            CSV met kolommen: <strong>naam, beveiligingspas, organisatie</strong>.
          </div>
          <input type="file" accept=".csv" onChange={handleWnCSV} />
          <div style={{marginTop:10, fontSize:13.5}}>
            <strong>{state.werknemers.length}</strong> werknemers geladen
            {wnBestanden.length>0 && <div style={{fontSize:12, color:'#8a8472'}}>{wnBestanden.join(', ')}</div>}
          </div>
        </Card>
      </div>

      <Card style={{width:'100%', maxWidth:920, marginTop:20, display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:16}}>
        <div style={{display:'flex', gap:14, alignItems:'center', flexWrap:'wrap', fontSize:14}}>
          <strong>{state.event.name}</strong>
          <span style={{color:'#8a8472'}}>{state.event.date}</span>
          <Pill tone="ok">{state.posities.length} posities</Pill>
          <Pill tone="ok">{state.werknemers.length} werknemers</Pill>
        </div>
        <div style={{display:'flex', gap:10}}>
          <Button variant="danger" onClick={nieuwEvenement}>Alles wissen</Button>
          <Button variant="signal" onClick={onStart}>Beginnen met plannen →</Button>
        </div>
      </Card>
    </div>
  );
}

// ---------- Balie tab ----------
function BalieTab({state, positieById, werknemerById, checkinByIndelingId, checkIn, checkOut, markNoShow, resetCheckin, setPrintData, printerActief, setPrinterActief, setMateriaalItemIngeleverd}){
  const [query, setQuery] = useState('');
  const [materiaalModal, setMateriaalModal] = useState(null); // {mode:'in'|'uit', indeling, positie, werknemer}
  const [subTab, setSubTab] = useState('balie'); // 'balie' | 'materiaal'
  const [statusFilter, setStatusFilter] = useState('alle'); // 'alle' | 'gepland' | 'ingecheckt' | 'uitgecheckt' | 'no-show'

  const alleRows = useMemo(() => {
    return state.indelingen
      .map(ind => {
        const positie = positieById[ind.positieId];
        const werknemer = werknemerById[ind.werknemerId];
        const checkin = checkinByIndelingId[ind.id];
        return {indeling: ind, positie, werknemer, checkin};
      })
      .filter(r => r.werknemer);
  }, [state, positieById, werknemerById, checkinByIndelingId]);

  const rows = useMemo(() => {
    return alleRows
      .filter(r => !query || r.werknemer.naam.toLowerCase().includes(query.toLowerCase()))
      .filter(r => statusFilter === 'alle' || (r.checkin?.status || 'gepland') === statusFilter);
  }, [alleRows, query, statusFilter]);

  // Openstaand materiaal: alle losse materiaal-items (over alle werknemers, ongeacht of ze al
  // zijn uitgecheckt) die nog niet als ingeleverd zijn afgevinkt.
  const openstaandMateriaal = useMemo(() => {
    const rows = [];
    state.indelingen.forEach(ind => {
      const positie = positieById[ind.positieId];
      const werknemer = werknemerById[ind.werknemerId];
      const checkin = checkinByIndelingId[ind.id];
      if(!werknemer || !checkin?.materiaalUitgegeven?.length) return;
      const openItems = checkin.materiaalUitgegeven
        .map((m, idx) => ({...m, idx}))
        .filter(m => !m.ingeleverd);
      if(openItems.length === 0) return;
      rows.push({indeling: ind, positie, werknemer, checkin, openItems});
    });
    return rows.sort((a,b) => a.werknemer.naam.localeCompare(b.werknemer.naam));
  }, [state, positieById, werknemerById, checkinByIndelingId]);

  const totaalOpenItems = useMemo(() => openstaandMateriaal.reduce((sum, r) => sum + r.openItems.length, 0), [openstaandMateriaal]);

  // Tellingen voor het overzicht rechtsboven in de balk.
  const ingecheckt = useMemo(() => state.checkins.filter(c=>c.status==='ingecheckt').length, [state.checkins]);
  const uitgecheckt = useMemo(() => state.checkins.filter(c=>c.status==='uitgecheckt').length, [state.checkins]);
  const noShow = useMemo(() => state.checkins.filter(c=>c.status==='no-show').length, [state.checkins]);
  const nogTeGaan = Math.max(state.indelingen.length - ingecheckt - uitgecheckt - noShow, 0);

  const statusTone = (status) => {
    if(status==='ingecheckt') return 'ok';
    if(status==='uitgecheckt') return 'default';
    if(status==='no-show') return 'warn';
    return 'signal';
  };
  const statusLabel = (status) => ({
    'gepland':'Gepland', 'ingecheckt':'Ingecheckt', 'uitgecheckt':'Uitgecheckt', 'no-show':'No-show'
  }[status] || 'Gepland');

  const openInchecken = (row) => {
    setMateriaalModal({
      mode:'in',
      indeling: row.indeling, positie: row.positie, werknemer: row.werknemer,
      startMateriaal: row.checkin?.materiaalUitgegeven?.length ? row.checkin.materiaalUitgegeven : row.positie.materiaal,
      startInTijd: row.checkin?.inTijd || nowTime(),
    });
  };
  const openUitchecken = (row) => {
    setMateriaalModal({
      mode:'uit',
      indeling: row.indeling, positie: row.positie, werknemer: row.werknemer,
      startMateriaal: row.checkin?.materiaalUitgegeven || [],
      startOpmerking: row.checkin?.opmerking || '',
      startUitTijd: row.checkin?.uitTijd || nowTime(),
    });
  };

  const bevestigInchecken = (materiaal, inTijd) => {
    const snapshot = checkIn(materiaalModal.indeling.id, materiaal, inTijd);
    setMateriaalModal(null);
    if(snapshot && printerActief) setPrintData(snapshot);
  };
  const bevestigUitchecken = (materiaal, opmerking, uitTijd) => {
    checkOut(materiaalModal.indeling.id, materiaal, opmerking, uitTijd);
    setMateriaalModal(null);
  };

  return (
    <div>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:10, marginBottom:20}}>
        <div style={{display:'flex', gap:4, background:'#dde3ee', borderRadius:9, padding:4, width:'fit-content'}}>
          <button onClick={()=>setSubTab('balie')} style={{
            padding:'7px 16px', borderRadius:6, border:'none', cursor:'pointer', fontWeight:600, fontSize:13.5,
            background: subTab==='balie' ? 'var(--moss)' : 'transparent', color: subTab==='balie' ? '#fff' : 'var(--moss-dark)',
          }}>Inchecken / afmelden</button>
          <button onClick={()=>setSubTab('materiaal')} style={{
            padding:'7px 16px', borderRadius:6, border:'none', cursor:'pointer', fontWeight:600, fontSize:13.5,
            background: subTab==='materiaal' ? 'var(--moss)' : 'transparent', color: subTab==='materiaal' ? '#fff' : 'var(--moss-dark)',
          }}>Openstaand materiaal {totaalOpenItems > 0 ? `(${totaalOpenItems})` : ''}</button>
        </div>
        <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
          <button onClick={()=>setStatusFilter(statusFilter==='ingecheckt' ? 'alle' : 'ingecheckt')} style={{border:'none', background:'none', padding:0, cursor:'pointer'}}>
            <Pill tone="ok">{ingecheckt} ingecheckt{statusFilter==='ingecheckt' ? ' ✓' : ''}</Pill>
          </button>
          <button onClick={()=>setStatusFilter(statusFilter==='gepland' ? 'alle' : 'gepland')} style={{border:'none', background:'none', padding:0, cursor:'pointer'}}>
            <Pill tone="signal">{nogTeGaan} nog niet ingecheckt{statusFilter==='gepland' ? ' ✓' : ''}</Pill>
          </button>
          <button onClick={()=>setStatusFilter(statusFilter==='uitgecheckt' ? 'alle' : 'uitgecheckt')} style={{border:'none', background:'none', padding:0, cursor:'pointer'}}>
            <Pill>{uitgecheckt} uitgecheckt{statusFilter==='uitgecheckt' ? ' ✓' : ''}</Pill>
          </button>
        </div>
      </div>

      {subTab === 'materiaal' ? (
        <div style={{display:'grid', gap:10}}>
          {openstaandMateriaal.length===0 && (
            <Card style={{textAlign:'center', color:'#8a8472'}}>Niemand heeft op dit moment nog openstaand materiaal.</Card>
          )}
          {openstaandMateriaal.map(row => (
            <Card key={row.indeling.id}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:16, flexWrap:'wrap', marginBottom:10}}>
                <div>
                  <div style={{fontFamily:'var(--display)', fontSize:17, fontWeight:600}}>{row.werknemer.naam}</div>
                  <div style={{fontSize:13, color:'#5a5645', marginTop:2}}>
                    {row.positie?.naam || '—'} {row.positie?.sectie ? `· ${row.positie.sectie}` : ''} · sinds {row.checkin?.inTijd}
                    {row.checkin?.status === 'uitgecheckt' && <> · al uitgecheckt om {row.checkin.uitTijd}</>}
                  </div>
                </div>
              </div>
              <div style={{display:'grid', gap:6}}>
                {row.openItems.map(m => (
                  <div key={m.idx} style={{display:'flex', alignItems:'center', justifyContent:'space-between', background:'#fbeee5', borderRadius:7, padding:'8px 12px'}}>
                    <span style={{fontSize:14}}>{m.aantal}x {m.naam}</span>
                    <Button variant="ghost" style={{padding:'4px 12px', fontSize:12.5}}
                      onClick={()=>setMateriaalItemIngeleverd(row.indeling.id, m.idx, true)}>Markeer als ingeleverd</Button>
                  </div>
                ))}
              </div>
            </Card>
          ))}
        </div>
      ) : (
      <>
      <div style={{marginBottom:20, display:'flex', gap:14, alignItems:'center', flexWrap:'wrap'}}>
        <input autoFocus value={query} onChange={e=>setQuery(e.target.value)}
          placeholder="Zoek werknemer op naam…"
          style={{...inputStyle, fontSize:20, padding:'16px 18px', fontFamily:'var(--display)', flex:1, minWidth:240}} />
        <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={{...inputStyle, width:220}}>
          <option value="alle">Alle statussen ({alleRows.length})</option>
          <option value="gepland">Nog niet ingecheckt ({nogTeGaan})</option>
          <option value="ingecheckt">Ingecheckt ({ingecheckt})</option>
          <option value="uitgecheckt">Uitgecheckt ({uitgecheckt})</option>
          <option value="no-show">No-show ({noShow})</option>
        </select>
        <label style={{display:'flex', alignItems:'center', gap:8, cursor:'pointer', fontSize:13.5, color:'var(--moss-dark)', fontWeight:600, whiteSpace:'nowrap'}}>
          <input type="checkbox" checked={printerActief} onChange={e=>setPrinterActief(e.target.checked)} style={{width:16, height:16, accentColor:'var(--moss)'}} />
          Bonprinter actief
        </label>
      </div>

      {statusFilter !== 'alle' && (
        <div style={{marginBottom:14, fontSize:13, color:'var(--moss-dark)'}}>
          Filter actief: <strong>{({gepland:'nog niet ingecheckt', ingecheckt:'ingecheckt', uitgecheckt:'uitgecheckt', 'no-show':'no-show'})[statusFilter]}</strong>
          {' · '}<button onClick={()=>setStatusFilter('alle')} style={{background:'none', border:'none', color:'var(--signal)', cursor:'pointer', fontWeight:600, padding:0}}>wis filter</button>
        </div>
      )}

      {rows.length===0 && (
        <Card style={{textAlign:'center', color:'#8a8472'}}>
          {state.indelingen.length===0
            ? 'Nog geen indeling ingevoerd. Ga naar de tab Indeling om werknemers aan posities te koppelen.'
            : statusFilter !== 'alle'
              ? 'Geen resultaten voor deze status en zoekterm.'
              : 'Geen resultaten bij deze zoekterm.'}
        </Card>
      )}

      <div style={{display:'grid', gap:10}}>
        {rows.map((row) => {
          const {indeling, positie, werknemer, checkin} = row;
          const status = checkin?.status || 'gepland';
          return (
            <Card key={indeling.id} style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:16, flexWrap:'wrap'}}>
              <div>
                <div style={{fontFamily:'var(--display)', fontSize:19, fontWeight:600}}>
                  {werknemer.naam} {positie?.leidinggevende && <Pill tone="signal">Leidinggevende</Pill>}
                </div>
                <div style={{fontSize:13.5, color:'#5a5645', marginTop:3}}>
                  {positie?.naam || '—'} {positie?.sectie ? `· ${positie.sectie}` : ''}
                </div>
              </div>
              <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap'}}>
                <Pill tone={statusTone(status)}>
                  {statusLabel(status)}
                  {status==='ingecheckt' && checkin?.inTijd ? ` ${checkin.inTijd}` : ''}
                  {status==='uitgecheckt' && checkin?.uitTijd ? ` ${checkin.uitTijd}` : ''}
                </Pill>
                {checkin?.opmerking && <Pill tone="signal" title={checkin.opmerking}>💬 opmerking</Pill>}
                {status==='gepland' && <>
                  <Button variant="signal" onClick={()=>openInchecken(row)}>Inchecken</Button>
                  <Button variant="ghost" onClick={()=>markNoShow(indeling.id)}>No-show</Button>
                </>}
                {status==='ingecheckt' && <>
                  <Button variant="primary" onClick={()=>openUitchecken(row)}>Afmelden</Button>
                  <Button variant="ghost" onClick={()=>openInchecken(row)}>Aanpassen</Button>
                </>}
                {(status==='uitgecheckt' || status==='no-show') && (
                  <Button variant="ghost" onClick={()=>resetCheckin(indeling.id)}>Terugzetten</Button>
                )}
              </div>
            </Card>
          );
        })}
      </div>
      </>
      )}

      {materiaalModal && (
        <MateriaalKeuzeModal
          mode={materiaalModal.mode}
          werknemer={materiaalModal.werknemer}
          positie={materiaalModal.positie}
          startMateriaal={materiaalModal.startMateriaal}
          startOpmerking={materiaalModal.startOpmerking}
          startUitTijd={materiaalModal.startUitTijd}
          startInTijd={materiaalModal.startInTijd}
          materiaalOpties={state.instellingen.materiaalOpties || DEFAULT_MATERIAAL_OPTIES}
          onConfirm={materiaalModal.mode==='in' ? bevestigInchecken : bevestigUitchecken}
          onCancel={()=>setMateriaalModal(null)}
        />
      )}
    </div>
  );
}

// ---------- Materiaalkeuze modal (bij in-/uitchecken) ----------
function MateriaalKeuzeModal({mode, werknemer, positie, startMateriaal, materiaalOpties, startOpmerking, startUitTijd, startInTijd, onConfirm, onCancel}){
  // Bij inchecken: vrij bewerkbare lijst van mee te geven materiaal.
  const [materiaal, setMateriaal] = useState(() => (startMateriaal||[]).map(m=>({...m})));
  // Bij uitchecken: dezelfde lijst staat vast (wat is meegegeven blijft geregistreerd),
  // en je vinkt per item aan of het is ingeleverd. Standaard staat niets aangevinkt —
  // alleen items die al eerder als ingeleverd waren gemarkeerd starten aangevinkt.
  const [ingeleverd, setIngeleverd] = useState(() => {
    const set = new Set();
    (startMateriaal||[]).forEach((m,i) => { if(m.ingeleverd) set.add(i); });
    return set;
  });
  const [opmerking, setOpmerking] = useState(startOpmerking || '');
  const [uitTijd, setUitTijd] = useState(startUitTijd || nowTime());
  const [inTijd, setInTijd] = useState(startInTijd || nowTime());

  const isGeselecteerd = (naam) => materiaal.some(m=>m.naam.toLowerCase()===naam.toLowerCase());
  const toggleOptie = (naam) => {
    if(mode !== 'in') return; // snelkeuze alleen relevant bij inchecken
    if(isGeselecteerd(naam)){
      setMateriaal(materiaal.filter(m=>m.naam.toLowerCase()!==naam.toLowerCase()));
    } else {
      setMateriaal([...materiaal, {naam, aantal:1}]);
    }
  };
  const updateAantal = (idx, aantal) => {
    const copy = [...materiaal];
    copy[idx] = {...copy[idx], aantal: Number(aantal)||1};
    setMateriaal(copy);
  };
  const removeRegel = (idx) => setMateriaal(materiaal.filter((_,i)=>i!==idx));
  const toggleIngeleverd = (idx) => {
    const copy = new Set(ingeleverd);
    if(copy.has(idx)) copy.delete(idx); else copy.add(idx);
    setIngeleverd(copy);
  };

  const [nieuwNaam, setNieuwNaam] = useState('');
  const [nieuwAantal, setNieuwAantal] = useState(1);
  const addCustom = () => {
    if(!nieuwNaam.trim()) return;
    setMateriaal([...materiaal, {naam:nieuwNaam.trim(), aantal:Number(nieuwAantal)||1}]);
    setNieuwNaam(''); setNieuwAantal(1);
  };

  const handleConfirm = () => {
    if(mode==='in') onConfirm(materiaal, inTijd);
    else {
      const ingeleverdNamen = new Set(materiaal.filter((_,i) => ingeleverd.has(i)).map(m=>m.naam.toLowerCase()));
      onConfirm(ingeleverdNamen, opmerking, uitTijd);
    }
  };

  // Toetsenbord-snelkeuze: cijfertoetsen 1-9 vinken direct de bijbehorende materiaaloptie aan/uit (alleen bij inchecken).
  // Werkt niet als de gebruiker op dat moment in een tekst- of getalveld typt.
  useEffect(() => {
    const handler = (e) => {
      const tag = document.activeElement?.tagName;
      if(tag === 'INPUT' || tag === 'TEXTAREA') return;
      const num = Number(e.key);
      if(mode==='in' && num >= 1 && num <= materiaalOpties.length){
        e.preventDefault();
        toggleOptie(materiaalOpties[num-1]);
      } else if(e.key === 'Enter'){
        e.preventDefault();
        handleConfirm();
      } else if(e.key === 'Escape'){
        e.preventDefault();
        onCancel();
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [materiaal, opmerking, uitTijd, inTijd, ingeleverd]);

  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(20,28,45,0.55)', display:'flex',
      alignItems:'center', justifyContent:'center', zIndex:60, padding:20
    }}>
      <div style={{background:'#fff', borderRadius:10, padding:24, maxWidth:440, width:'100%', maxHeight:'88vh', overflowY:'auto'}}>
        <h3 style={{marginTop:0, fontFamily:'var(--display)'}}>
          {mode==='in' ? 'Materiaal bij inchecken' : 'Materiaal inleveren bij afmelden'}
        </h3>
        <div style={{fontSize:13.5, color:'#5a5645', marginBottom:16}}>
          {werknemer.naam} · {positie?.naam}{positie?.sectie ? ` · ${positie.sectie}` : ''}
        </div>

        {mode==='in' && (
          <Field label="Inchecktijd (standaard nu)">
            <input type="time" style={inputStyle} value={inTijd} onChange={e=>setInTijd(e.target.value)} />
          </Field>
        )}

        {positie?.materiaal?.length > 0 && mode==='in' && (
          <div style={{fontSize:12.5, color:'var(--moss-dark)', background:'#eef1f6', borderRadius:7, padding:'8px 12px', marginBottom:14}}>
            Standaard bij deze positie: {positie.materiaal.map(m=>`${m.aantal}x ${m.naam}`).join(', ')}
          </div>
        )}

        {mode==='in' && (
          <>
            <div style={{fontSize:12, fontWeight:700, textTransform:'uppercase', letterSpacing:'.05em', color:'var(--moss-dark)', marginBottom:8}}>
              Snelkeuze <span style={{fontWeight:400, textTransform:'none', letterSpacing:'normal'}}>(of druk op het cijfer)</span>
            </div>
            <div style={{display:'flex', gap:8, flexWrap:'wrap', marginBottom:16}}>
              {materiaalOpties.map((optie, i) => (
                <button key={optie} onClick={()=>toggleOptie(optie)} style={{
                  padding:'8px 14px', borderRadius:8, cursor:'pointer', fontSize:13.5, fontWeight:600,
                  border: isGeselecteerd(optie) ? '1px solid var(--moss)' : '1px solid var(--line)',
                  background: isGeselecteerd(optie) ? 'var(--moss)' : '#fff',
                  color: isGeselecteerd(optie) ? '#fff' : 'var(--ink)',
                }}>{i+1}. {optie}</button>
              ))}
            </div>

            <div style={{fontSize:12, fontWeight:700, textTransform:'uppercase', letterSpacing:'.05em', color:'var(--moss-dark)', marginBottom:8}}>
              Mee te geven materiaal
            </div>
            <div style={{display:'grid', gap:6, marginBottom:10}}>
              {materiaal.length===0 && <div style={{fontSize:13, color:'#8a8472'}}>Geen materiaal geselecteerd.</div>}
              {materiaal.map((m,i) => (
                <div key={i} style={{display:'flex', alignItems:'center', gap:8}}>
                  <input type="number" min="1" style={{...inputStyle, width:60}} value={m.aantal} onChange={e=>updateAantal(i, e.target.value)} />
                  <div style={{flex:1, fontSize:14}}>{m.naam}</div>
                  <button onClick={()=>removeRegel(i)} style={{background:'none', border:'none', color:'var(--warn)', cursor:'pointer', fontSize:13}}>verwijderen</button>
                </div>
              ))}
            </div>

            <div style={{display:'flex', gap:8, marginBottom:18}}>
              <input style={{...inputStyle, width:64}} type="number" min="1" value={nieuwAantal} onChange={e=>setNieuwAantal(e.target.value)} />
              <input style={inputStyle} placeholder="ander materiaal toevoegen…" value={nieuwNaam} onChange={e=>setNieuwNaam(e.target.value)} />
              <Button variant="ghost" onClick={addCustom}>+</Button>
            </div>
          </>
        )}

        {mode==='uit' && (
          <>
            <div style={{fontSize:12, fontWeight:700, textTransform:'uppercase', letterSpacing:'.05em', color:'var(--moss-dark)', marginBottom:8}}>
              Meegegeven materiaal — vink af wat is ingeleverd
            </div>
            <div style={{display:'grid', gap:6, marginBottom:18}}>
              {materiaal.length===0 && <div style={{fontSize:13, color:'#8a8472'}}>Er was geen materiaal meegegeven.</div>}
              {materiaal.map((m,i) => (
                <label key={i} style={{display:'flex', alignItems:'center', gap:10, cursor:'pointer', background:'#f4f6fa', borderRadius:7, padding:'8px 12px'}}>
                  <input type="checkbox" checked={ingeleverd.has(i)} onChange={()=>toggleIngeleverd(i)} style={{width:16, height:16, accentColor:'var(--moss)'}} />
                  <span style={{fontSize:14, flex:1}}>{m.aantal}x {m.naam}</span>
                  {!ingeleverd.has(i) && <Pill tone="warn">niet ingeleverd</Pill>}
                </label>
              ))}
            </div>

            <Field label="Uitchecktijd (standaard nu, eerder uitchecken kan)">
              <input type="time" style={inputStyle} value={uitTijd} onChange={e=>setUitTijd(e.target.value)} />
            </Field>
            <Field label="Opmerking (optioneel)">
              <textarea style={{...inputStyle, minHeight:64, resize:'vertical', fontFamily:'var(--body)'}}
                value={opmerking} onChange={e=>setOpmerking(e.target.value)} placeholder="Bijzonderheden bij het afmelden…" />
            </Field>
          </>
        )}

        <div style={{display:'flex', gap:10, justifyContent:'flex-end'}}>
          <Button variant="ghost" onClick={onCancel}>Annuleer</Button>
          <Button variant={mode==='in' ? 'signal' : 'primary'} onClick={handleConfirm}>
            {mode==='in' ? 'Inchecken' : 'Afmelden bevestigen'}
          </Button>
        </div>
      </div>
    </div>
  );
}

// ---------- Bonnetje (print) ----------
function Bonnetje({data, autoPrint, onClose}){
  useEffect(() => {
    if(!autoPrint) return;
    const t = setTimeout(() => window.print(), 150);
    return () => clearTimeout(t);
  }, []);
  useEffect(() => {
    const handler = () => onClose();
    window.addEventListener('afterprint', handler);
    return () => window.removeEventListener('afterprint', handler);
  }, []);
  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(28,43,34,0.55)', display:'flex',
      alignItems:'center', justifyContent:'center', zIndex:50
    }}>
      <div style={{background:'#fff', borderRadius:10, padding:24, maxWidth:360, width:'92%'}}>
        <div id="bonnetje" style={{fontFamily:'var(--mono)', fontSize:13, lineHeight:1.5, color:'#000', border:'1px dashed #ccc', padding:12, borderRadius:6}}>
          <div style={{textAlign:'center', fontWeight:700, fontSize:15, marginBottom:4}}>{data.event.name}</div>
          <div style={{textAlign:'center', marginBottom:10}}>{data.event.date}</div>
          <div style={{borderTop:'1px dashed #000', margin:'8px 0'}}></div>
          <div><strong>{data.werknemer.naam}</strong></div>
          <div>Ingecheckt: {data.inTijd}</div>
          <div style={{borderTop:'1px dashed #000', margin:'8px 0'}}></div>
          <div><strong>Positie:</strong> {data.positie.naam}</div>
          {data.positie.sectie && <div><strong>Sectie:</strong> {data.positie.sectie}</div>}
          {data.positie.uniform && data.positie.uniform.length>0 && <div><strong>Uniform:</strong> {data.positie.uniform.join(', ')}</div>}
          <div style={{borderTop:'1px dashed #000', margin:'8px 0'}}></div>
          <div style={{fontWeight:700, marginBottom:4}}>Materiaal mee:</div>
          {data.materiaal.length===0 && <div>— geen —</div>}
          {data.materiaal.map((m,i) => <div key={i}>{m.aantal}x {m.naam}</div>)}
          <div style={{borderTop:'1px dashed #000', margin:'8px 0'}}></div>
          <div style={{textAlign:'center', fontSize:11}}>Bedankt voor je inzet!</div>
        </div>
        {!autoPrint && (
          <div style={{fontSize:12, color:'#8a8472', marginTop:10}}>Bonprinter staat uit — er wordt niet automatisch geprint.</div>
        )}
        <div style={{display:'flex', gap:10, marginTop:18, justifyContent:'flex-end'}}>
          <Button variant="ghost" onClick={onClose}>Sluiten</Button>
          <Button variant="primary" onClick={()=>window.print()}>{autoPrint ? 'Print opnieuw' : 'Print bon'}</Button>
        </div>
      </div>
    </div>
  );
}

// ---------- Posities tab ----------
function PositiesTab({posities, addPositie, updatePositie, removePositie, addMateriaalRegel, removeMateriaalRegel, importPosities}){

  const [sectie, setSectie] = useState('');
  const [uniform, setUniform] = useState([]);
  const [portofoon, setPortofoon] = useState(false);
  const [plakdienst, setPlakdienst] = useState(false);
  const [leidinggevende, setLeidinggevende] = useState(false);
  const [editId, setEditId] = useState(null);

  const [query, setQuery] = useState('');

  const toggleUniform = (val, list, setList) => {
    setList(list.includes(val) ? list.filter(u=>u!==val) : [...list, val]);
  };

  const handleFile = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const rows = parseCSV(ev.target.result);
      importPosities(rows);
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  // Overzicht aantal posities per sectie, voor controle tegen verwachte inzet
  const sectieOverzicht = useMemo(() => {
    const m = {};
    posities.forEach(p => {
      const key = p.sectie || '(geen sectie)';
      m[key] = (m[key]||0) + 1;
    });
    return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0]));
  }, [posities]);

  const gefilterdGesorteerd = useMemo(() => {
    let list = [...posities];
    if(query){
      const q = query.toLowerCase();
      list = list.filter(p => p.naam.toLowerCase().includes(q) || (p.sectie||'').toLowerCase().includes(q));
    }
    if(sortBy==='sectie') list.sort((a,b) => (a.sectie||'').localeCompare(b.sectie||'') || a.naam.localeCompare(b.naam));
    if(sortBy==='naam') list.sort((a,b) => a.naam.localeCompare(b.naam));

    <div style={{display:'grid', gridTemplateColumns:'340px 1fr', gap:24}}>

            <Checkbox checked={portofoon} onChange={setPortofoon} label="Vereist portofoon" />
          </div>
          <div style={{marginBottom:8}}>
            <Checkbox checked={plakdienst} onChange={setPlakdienst} label="Plakdienst (meerdere mensen tegelijk toegestaan)" />

          <div style={{marginBottom:14}}>

  );
