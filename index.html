// ---------- Indeling tab ----------
function IndelingTab({state, addIndeling, updateIndeling, removeIndeling, positieById, werknemerById, checkBeveiligingspasWaarschuwing}){
  const [sortBy, setSortBy] = useState('sectie'); // 'sectie' | 'naam' | 'bezetting'
  const [query, setQuery] = useState('');
  const [foutmelding, setFoutmelding] = useState(null);

  // Indelingen per positie groeperen
  const indelingenPerPositie = useMemo(() => {
    const m = {};
    state.indelingen.forEach(ind => {
      if(!m[ind.positieId]) m[ind.positieId] = [];
      m[ind.positieId].push(ind);
    });
    return m;
  }, [state.indelingen]);

  const gesorteerdePosities = useMemo(() => {
    let list = [...state.posities];
    if(query){
      const q = query.toLowerCase();
      list = list.filter(p => {
        if(p.naam.toLowerCase().includes(q) || (p.sectie||'').toLowerCase().includes(q)) return true;
        const inds = indelingenPerPositie[p.id] || [];
        return inds.some(ind => (werknemerById[ind.werknemerId]?.naam||'').toLowerCase().includes(q));
      });
    }
    if(sortBy==='sectie') list.sort((a,b) => (a.sectie||'').localeCompare(b.sectie||'') || a.naam.localeCompare(b.naam));
    if(sortBy==='naam') list.sort((a,b) => a.naam.localeCompare(b.naam));
    if(sortBy==='bezetting') list.sort((a,b) => (indelingenPerPositie[a.id]?.length||0) - (indelingenPerPositie[b.id]?.length||0));
    return list;
  }, [state.posities, sortBy, query, indelingenPerPositie, werknemerById]);

  // Werknemers die dubbel gepland staan: twee keer op reguliere diensten, of twee keer op plakdiensten.
  // Een combinatie van 1 reguliere + 1 plakdienst is toegestaan en wordt niet gemeld.
  const dubbelGepland = useMemo(() => {
    const perWerknemer = {};
    state.indelingen.forEach(ind => {
      if(!perWerknemer[ind.werknemerId]) perWerknemer[ind.werknemerId] = [];
      perWerknemer[ind.werknemerId].push(ind);
    });
    const result = [];
    Object.entries(perWerknemer).forEach(([wid, inds]) => {
      const werknemer = werknemerById[wid];
      if(!werknemer) return;
      const regulier = inds.filter(ind => !positieById[ind.positieId]?.plakdienst);
      const plak = inds.filter(ind => positieById[ind.positieId]?.plakdienst);
      const problemen = [];
      if(regulier.length > 1) problemen.push(...regulier);
      if(plak.length > 1) problemen.push(...plak);
      if(problemen.length > 0) result.push({werknemer, indelingen: problemen});
    });
    return result;
  }, [state.indelingen, werknemerById, positieById]);

  const [pendingTekst, setPendingTekst] = useState({}); // positieId -> getypte naam
  const [pasWaarschuwing, setPasWaarschuwing] = useState(null); // {positieId, werknemer, tekst}

  // Probeert te koppelen op basis van de getypte tekst voor één positie.
  // toonFout: of een foutmelding getoond moet worden als de tekst geen geldige werknemer is
  // (true bij Enter/blur — de gebruiker is klaar met typen; false bij stille pogingen).
  const probeerKoppelen = (positieId, toonFout, negeerPasWaarschuwing) => {
    const tekst = (pendingTekst[positieId] || '').trim();
    if(!tekst) return;
    const werknemer = state.werknemers.find(w => w.naam.toLowerCase() === tekst.toLowerCase());
    if(!werknemer){
      if(toonFout) setFoutmelding(`Geen werknemer gevonden met de naam "${tekst}". Voeg deze eerst toe bij Werknemers, of kies uit de suggesties tijdens het typen.`);
      return;
    }
    const positie = positieById[positieId];
    if(!negeerPasWaarschuwing){
      const waarschuwing = checkBeveiligingspasWaarschuwing(positie, werknemer);
      if(waarschuwing){ setPasWaarschuwing({positieId, werknemer, tekst: waarschuwing}); return; }
    }
    const error = addIndeling(positieId, werknemer.id);
    if(error){ if(toonFout) setFoutmelding(error); return; }
    setPendingTekst(prev => ({...prev, [positieId]: ''}));
    setPasWaarschuwing(null);
  };

  const handleKoppelTekst = (positieId, negeerPasWaarschuwing) => probeerKoppelen(positieId, true, negeerPasWaarschuwing);

  // Bij het verlaten van het invoerveld (blur) wordt automatisch geprobeerd te koppelen,
  // zonder Enter nodig te hebben. Geen foutmelding bij een onvolledige/foute naam, want de
  // gebruiker klikte mogelijk per ongeluk weg.
  const handleBlurKoppel = (positieId) => probeerKoppelen(positieId, false);

  // Bij het verlaten van dit tabblad (unmount) nog één keer proberen alle nog openstaande,
  // geldig ingevulde velden te koppelen. Refs voorkomen dat de cleanup-closure met
  // verouderde data werkt (de afhankelijkheden-array van het effect blijft leeg, dus zonder
  // refs zou hij de staat van het allereerste moment van mounten gebruiken).
  const pendingTekstRef = useRef(pendingTekst);
  pendingTekstRef.current = pendingTekst;
  const positieByIdRef = useRef(positieById);
  positieByIdRef.current = positieById;
  const werknemersRef = useRef(state.werknemers);
  werknemersRef.current = state.werknemers;

  useEffect(() => {
    return () => {
      Object.keys(pendingTekstRef.current).forEach(positieId => {
        const tekst = (pendingTekstRef.current[positieId] || '').trim();
        if(!tekst) return;
        const werknemer = werknemersRef.current.find(w => w.naam.toLowerCase() === tekst.toLowerCase());
        if(!werknemer) return;
        const positie = positieByIdRef.current[positieId];
        const waarschuwing = checkBeveiligingspasWaarschuwing(positie, werknemer);
        if(waarschuwing) return; // bij twijfel niet automatisch doorzetten, vereist bevestiging
        addIndeling(positieId, werknemer.id);
      });
    };
    // eslint-disable-next-line
  }, []);

  return (
    <div style={{display:'grid', gap:20}}>
      <datalist id="werknemer-namen">
        {state.werknemers.map(w => <option key={w.id} value={w.naam} />)}
      </datalist>

      {foutmelding && (
        <Card style={{borderColor:'var(--warn)', background:'#fbeee5', display:'flex', justifyContent:'space-between', alignItems:'center', gap:12}}>
          <div style={{fontSize:14, color:'var(--warn)'}}>{foutmelding}</div>
          <Button variant="ghost" onClick={()=>setFoutmelding(null)}>Sluiten</Button>
        </Card>
      )}

      {dubbelGepland.length > 0 && (
        <Card style={{borderColor:'var(--warn)', background:'#fbeee5'}}>
          <h3 style={{marginTop:0, fontFamily:'var(--display)', color:'var(--warn)'}}>⚠ Dubbel gepland ({dubbelGepland.length})</h3>
          <div style={{display:'grid', gap:8}}>
            {dubbelGepland.map(({werknemer, indelingen}) => (
              <div key={werknemer.id} style={{fontSize:14}}>
                <strong>{werknemer.naam}</strong> staat op {indelingen.length} posities van hetzelfde type (regulier of plakdienst):{' '}
                {indelingen.map((ind,i) => {
                  const p = positieById[ind.positieId];
                  return <span key={ind.id}>{i>0 && ', '}{p?.naam}{p?.sectie ? ` (${p.sectie})` : ''}</span>;
                })}
              </div>
            ))}
          </div>
        </Card>
      )}

      <Card>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', gap:16, flexWrap:'wrap', marginBottom:16}}>
          <h3 style={{margin:0, fontFamily:'var(--display)'}}>Posities ({gesorteerdePosities.length})</h3>
          <div style={{display:'flex', gap:10, alignItems:'center', flexWrap:'wrap'}}>
            <input style={{...inputStyle, width:220}} placeholder="Zoek positie, sectie of werknemer…" value={query} onChange={e=>setQuery(e.target.value)} />
            <select style={{...inputStyle, width:170}} value={sortBy} onChange={e=>setSortBy(e.target.value)}>
              <option value="sectie">Sorteer: sectie</option>
              <option value="naam">Sorteer: positienaam</option>
              <option value="bezetting">Sorteer: aantal bezet</option>
            </select>
          </div>
        </div>

        {gesorteerdePosities.length===0 && <div style={{color:'#8a8472'}}>Geen posities gevonden. Maak eerst posities aan.</div>}

        <div style={{display:'grid', gap:6}}>
          {gesorteerdePosities.map(p => {
            const inds = indelingenPerPositie[p.id] || [];
            const vol = !p.plakdienst && inds.length >= 1;
            return (
              <div key={p.id} style={{border:'1px solid var(--line)', borderRadius:8, padding:'10px 12px'}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:8}}>
                  <div style={{display:'flex', alignItems:'baseline', gap:8, flexWrap:'wrap', minWidth:160}}>
                    <span style={{fontWeight:700, fontSize:14}}>{p.naam}</span>
                    {p.sectie && <span style={{fontSize:12, color:'#5a5645'}}>{p.sectie}</span>}
                    {p.plakdienst && <Pill>Plakdienst</Pill>}
                    {p.leidinggevende && <Pill tone="signal">Leidinggevende</Pill>}
                  </div>

                  {inds.length > 0 ? (
                    <div style={{display:'flex', flexWrap:'wrap', gap:6, flex:1, justifyContent:'flex-end'}}>
                      {inds.map(ind => {
                        const w = werknemerById[ind.werknemerId];
                        return (
                          <div key={ind.id} style={{display:'flex', alignItems:'center', gap:6, background:'#f4f6fa', borderRadius:6, padding:'3px 4px 3px 10px', fontSize:13}}>
                            <span>{w?.naam || '—'}</span>
                            <button onClick={()=>removeIndeling(ind.id)} style={{background:'none', border:'none', color:'var(--warn)', cursor:'pointer', fontSize:15, lineHeight:1, padding:'0 4px'}} title="Verwijderen">×</button>
                          </div>
                        );
                      })}
                    </div>
                  ) : (
                    <span style={{fontSize:12, color:'#8a8472'}}>Niet gekoppeld</span>
                  )}
                </div>

                {!vol && (
                  <div style={{marginTop:8}}>
                    <input
                      list="werknemer-namen"
                      style={{...inputStyle, padding:'6px 10px', fontSize:13, width:260}}
                      placeholder="Typ naam…"
                      value={pendingTekst[p.id] || ''}
                      onChange={e=>setPendingTekst(prev=>({...prev, [p.id]: e.target.value}))}
                      onKeyDown={e=>{ if(e.key==='Enter'){ e.preventDefault(); handleKoppelTekst(p.id); } }}
                      onBlur={()=>handleBlurKoppel(p.id)}
                    />
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </Card>

      {pasWaarschuwing && (
        <div style={{
          position:'fixed', inset:0, background:'rgba(20,28,45,0.55)', display:'flex',
          alignItems:'center', justifyContent:'center', zIndex:60, padding:20
        }}>
          <Card style={{maxWidth:420, width:'100%'}}>
            <h3 style={{marginTop:0, fontFamily:'var(--display)', color:'var(--warn)'}}>⚠ Geen beveiligingspas</h3>
            <p style={{fontSize:14}}>{pasWaarschuwing.tekst}</p>
            <div style={{display:'flex', gap:10, justifyContent:'flex-end'}}>
              <Button variant="ghost" onClick={()=>setPasWaarschuwing(null)}>Annuleer</Button>
              <Button variant="signal" onClick={()=>handleKoppelTekst(pasWaarschuwing.positieId, true)}>Toch koppelen</Button>
            </div>
          </Card>
        </div>
      )}
    </div>
  );
}

// ---------- Exports tab ----------
function ExportsTab({state, positieById, werknemerById}){

  // Knipt tekst af met '…' zodat die in de gegeven breedte past, i.p.v. jsPDF's automatische word-wrap
  // (die regels laat overlappen omdat de regelhoogte vast is).
  const fitText = (doc, text, maxWidth) => {
    if(!text) return '';
    if(doc.getTextWidth(text) <= maxWidth) return text;
    let truncated = text;
    while(truncated.length > 1 && doc.getTextWidth(truncated + '…') > maxWidth){
      truncated = truncated.slice(0, -1);
    }
    return truncated + '…';
  };


  const sectieGroepen = useMemo(() => {
    const m = {};
    state.posities.forEach(p => {
      const key = p.sectie || '(geen sectie)';
      if(!m[key]) m[key] = [];
      m[key].push(p);
    });
    return m;
  }, [state.posities]);

  // ----- Inzetlijst (PDF, 2 kolommen, alfabetisch) -----
  const exportTotaaloverzicht = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({unit:'pt', format:'a4'});
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();
    const margin = 36;
    const gutter = 24;
    const colWidth = (pageW - margin*2 - gutter) / 2;
    const colXs = [margin, margin + colWidth + gutter];
    const lineHeight = 14.5;
    const sectionGap = 10;

    const sectieNamenAlfabetisch = Object.keys(sectieGroepen).sort((a,b)=>a.localeCompare(b));

    // bouw een vlakke lijst van "regels" per sectie-blok: header + items
    const blokken = sectieNamenAlfabetisch.map(sectieNaam => {
      const posInSectie = [...sectieGroepen[sectieNaam]].sort((a,b)=>a.naam.localeCompare(b.naam));
      const items = [];
      posInSectie.forEach(p => {
        const inds = state.indelingen.filter(ind => ind.positieId === p.id);
        if(inds.length === 0){
          items.push({positie: p, werknemerNaam: ''});
        } else {
          inds.forEach(ind => {
            const w = werknemerById[ind.werknemerId];
            items.push({positie: p, werknemerNaam: w?.naam || ''});
          });
        }
      });
      return {sectieNaam, items};
    });

    let col = 0;
    let y = margin;
    let x = colXs[0];

    doc.setFont('helvetica','bold'); doc.setFontSize(16);
    doc.text(state.event.name + ' — Inzetlijst', margin, y);
    y += 22;
    doc.setLineWidth(0.75);
    doc.line(margin, y, pageW - margin, y);
    y += 20;
    let colTopY = y;
    let yByCol = [y, y]; // track y per column independently isn't quite right for jsPDF flow; we use single flow with column switch on overflow

    const ensureSpace = (needed) => {
      if(y + needed > pageH - margin){
        if(col === 0){
          col = 1; x = colXs[1]; y = colTopY;
        } else {
          doc.addPage();
          col = 0; x = colXs[0]; y = margin; colTopY = margin;
        }
      }
    };

    blokken.forEach(blok => {
      if(blok.items.length === 0) return;
      const blokHeight = sectionGap + 16 + blok.items.length * lineHeight + 8;
      ensureSpace(Math.min(blokHeight, pageH - margin - colTopY));

      doc.setFont('helvetica','bold'); doc.setFontSize(11.5);
      doc.text(blok.sectieNaam, x, y);
      y += 6;
      doc.setLineWidth(0.5);
      doc.line(x, y, x + colWidth, y);
      y += 14;

      doc.setFont('helvetica','normal'); doc.setFontSize(9.5);
      blok.items.forEach(item => {
        ensureSpace(lineHeight + 4);
        // portofoon checkbox
        doc.setLineWidth(0.6);
        doc.rect(x, y - 7.5, 8, 8);
        if(item.positie.vereistPortofoon){
          doc.setLineWidth(1);
          doc.line(x+1.3, y-3.5, x+3.3, y-1.3);
          doc.line(x+3.3, y-1.3, x+6.8, y-6.8);
        }
        const labelX = x + 13;
        const naamX = x + Math.min(colWidth*0.52, 130);
        let posLabel = item.positie.naam;
        if(item.positie.leidinggevende) posLabel += ' (leiding)';
        doc.text(fitText(doc, posLabel, naamX - labelX - 6), labelX, y);
        doc.text(fitText(doc, item.werknemerNaam || '—', x + colWidth - naamX), naamX, y);
        y += lineHeight;
      });
      y += sectionGap;
    });

    doc.save(`${state.event.name.replace(/\s+/g,'_')}_inzetlijst.pdf`);
  };

  // ----- Per-sectie wedstrijdformulier (PDF) -----
  // Leidinggevenden vandaag = ALLE indelingen met het vinkje 'leidinggevende', over alle secties heen (niet sectie-gebonden).
  // Werknemers in het vak = alle werknemers ingedeeld binnen de eigen sectie.

  const exportWedstrijdformulieren = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({unit:'pt', format:'a4'});
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();
    const margin = 42;
    let first = true;
    const ins = state.instellingen;

    // Leidinggevenden vandaag = alle indelingen op posities die als 'leidinggevende' zijn aangemerkt.
    const alleLeidinggevenden = state.indelingen.filter(ind => positieById[ind.positieId]?.leidinggevende);
    const sectieNamen = Object.keys(sectieGroepen).sort((a,b)=>a.localeCompare(b));

    sectieNamen.forEach(sectieNaam => {
      if(!first) doc.addPage();
      first = false;

      const posInSectie = sectieGroepen[sectieNaam];
      const posIds = new Set(posInSectie.map(p=>p.id));
      const indelingenInSectie = state.indelingen.filter(ind => posIds.has(ind.positieId));
      const leidinggevenden = alleLeidinggevenden; // sectie-overstijgend, op elke pagina hetzelfde
      const vakWerknemers = indelingenInSectie; // blijft per sectie

      let y = margin;
      const contentW = pageW - margin*2;

      // Header met logo i.p.v. tekst
      const logoH = 26;
      const logoW = logoH * LOGO_ASPECT_RATIO;
      try { doc.addImage(LOGO_BASE64, 'JPEG', margin, y - logoH + 6, logoW, logoH); } catch(e){ /* logo kon niet geladen worden */ }
      doc.setFont('helvetica','bold'); doc.setFontSize(13);
      doc.text(sectieNaam, pageW - margin, y, {align:'right'});
      y += 10;
      doc.setLineWidth(1);
      doc.line(margin, y, pageW - margin, y);
      y += 24;

      // Algemeen box: evenement/wedstrijd naam + datum
      const algemeenBoxH = 44;
      doc.setFont('helvetica','bold'); doc.setFontSize(10.5);
      doc.text(ins.algemeenLabel, margin, y - 4);
      y += 4;
      doc.setLineWidth(1);
      doc.rect(margin, y, contentW, algemeenBoxH);
      doc.setFont('helvetica','normal'); doc.setFontSize(10.5);
      doc.text(ins.naamLabel, margin + 12, y + 19);
      doc.setLineWidth(0.5);
      doc.line(margin + 95, y + 21, margin + contentW - 12, y + 21);
      doc.text(fitText(doc, state.event.name, contentW - 112), margin + 100, y + 19);
      doc.text('Datum', margin + 12, y + 37);
      doc.line(margin + 95, y + 39, margin + contentW - 12, y + 39);
      const datumWeergave = state.event.date ? new Date(state.event.date + 'T00:00:00').toLocaleDateString('nl-NL', {day:'2-digit', month:'2-digit', year:'numeric'}) : '';
      doc.text(datumWeergave, margin + 100, y + 37);
      y += algemeenBoxH + 28;

      // Twee kolommen: leidinggevenden (alle secties, zonder tijden) / werknemers in het vak (eigen sectie, met begin/eind)
      const colGap = 20;
      const colLeftX = margin;
      const colRightX = margin + contentW * 0.5 + colGap/2;
      const colLeftW = contentW * 0.5 - colGap/2;
      const colRightW = contentW * 0.5 - colGap/2;
      const headerY = y;

      doc.setFont('helvetica','bold'); doc.setFontSize(11.5);
      doc.text(ins.leidinggevendenTitel, colLeftX, headerY);
      doc.text(ins.werknemersTitel, colRightX, headerY);
      doc.setFont('helvetica','normal'); doc.setFontSize(9);
      doc.text('Begin', colRightX + colRightW - 70, headerY);
      doc.text('Eind', colRightX + colRightW - 28, headerY);

      let yLeft = headerY + 16;
      let yRight = headerY + 16;
      const lineHeight = 17;

      doc.setFont('helvetica','normal'); doc.setFontSize(9.5);

      // Werknemers in het vak: altijd minimaal 4 lege rijen extra voor wisselingen op de dag zelf
      const vakRijenCount = vakWerknemers.length + 4;
      const rowsCount = Math.max(leidinggevenden.length, vakRijenCount, 8);

      // Linkerkolom: positie smal, naam krijgt de rest van de ruimte (geen tijdkolommen nodig)
      const leftRoleW = Math.min(colLeftW*0.36, 90);
      const leftNameW = colLeftW - leftRoleW - 6;
      // Rechterkolom: iets smallere positie, naam-kolom moet ruimte overhouden voor de Begin/Eind-stippellijnen
      const rightRoleW = Math.min(colRightW*0.30, 80);
      const rightNameW = colRightW - rightRoleW - 13 - 88;

      for(let i=0;i<rowsCount;i++){
        // Linkerkolom: leidinggevenden, geen begin/eind tijden nodig
        if(i < leidinggevenden.length){
          const ind = leidinggevenden[i];
          const p = positieById[ind.positieId];
          const w = werknemerById[ind.werknemerId];
          doc.text(fitText(doc, p?.naam || '', leftRoleW - 4), colLeftX, yLeft);
          doc.text(fitText(doc, w?.naam || '', leftNameW), colLeftX + leftRoleW, yLeft);
        }
        yLeft += lineHeight;

        // Rechterkolom: werknemers in het vak, mét begin/eind stippellijn; extra lege rijen aan het eind
        if(i < vakRijenCount){
          doc.setLineWidth(0.6);
          doc.rect(colRightX, yRight - 7.5, 8, 8);
          if(i < vakWerknemers.length){
            const ind = vakWerknemers[i];
            const p = positieById[ind.positieId];
            const w = werknemerById[ind.werknemerId];
            doc.text(fitText(doc, p?.naam || '', rightRoleW - 4), colRightX + 13, yRight);
            doc.text(fitText(doc, w?.naam || '', rightNameW), colRightX + 13 + rightRoleW, yRight);
          }
          doc.setLineWidth(0.5);
          doc.setLineDashPattern([1,1.4], 0);
          doc.line(colRightX + colRightW - 70, yRight+3, colRightX + colRightW - 34, yRight+3);
          doc.line(colRightX + colRightW - 26, yRight+3, colRightX + colRightW, yRight+3);
          doc.setLineDashPattern([], 0);
        }
        yRight += lineHeight;
      }

      y = Math.max(yLeft, yRight) + 16;

      // Checklist
      doc.setFont('helvetica','bold'); doc.setFontSize(11.5);
      doc.text('Checklist voor de wedstrijd', margin, y);
      y += 18;
      doc.setFont('helvetica','normal'); doc.setFontSize(10);
      (ins.checklistItems || DEFAULT_CHECKLIST).forEach(item => {
        doc.setLineWidth(0.6);
        doc.rect(margin, y-7.5, 8, 8);
        doc.text(item, margin + 14, y);
        y += 15.5;
      });
      y += 12;

      // Feedback boxes — pas hoogte aan zodat ze altijd op de pagina passen, met lijntjes om recht te kunnen schrijven
      const remaining = pageH - margin - y;
      const feedbackBoxH = Math.max(60, Math.min(95, (remaining - 50) / 2));
      const feedbackLineGap = 16;

      const drawFeedbackBox = (titel, boxY) => {
        doc.setFont('helvetica','bold'); doc.setFontSize(10.5);
        doc.text(titel, margin, boxY);
        const topY = boxY + 8;
        doc.setLineWidth(1);
        doc.rect(margin, topY, contentW, feedbackBoxH);
        doc.setLineWidth(0.4);
        doc.setLineDashPattern([1,1.2], 0);
        let lineY = topY + feedbackLineGap;
        while(lineY < topY + feedbackBoxH - 6){
          doc.line(margin + 8, lineY, margin + contentW - 8, lineY);
          lineY += feedbackLineGap;
        }
        doc.setLineDashPattern([], 0);
        return topY + feedbackBoxH;
      };

      const afterExtern = drawFeedbackBox(ins.feedbackTitelExtern, y);
      y = afterExtern + 22;
      drawFeedbackBox(ins.feedbackTitelIntern, y);
    });

    doc.save(`${state.event.name.replace(/\s+/g,'_')}_inzetformulier_per_sectie.pdf`);
  };

  // ----- In-/uitchecktijden (PDF), voor controle -----
  const exportChecktijden = () => {
    const rows = state.indelingen.map(ind => {
      const p = positieById[ind.positieId];
      const w = werknemerById[ind.werknemerId];
      const c = state.checkins.find(c=>c.indelingId===ind.id);
      const statusLabel = {'gepland':'Gepland','ingecheckt':'Ingecheckt','uitgecheckt':'Uitgecheckt','no-show':'No-show'}[c?.status] || 'Gepland';
      return {
        'Werknemer': w?.naam || '—',
        'Organisatie': w?.organisatie || '',
        'Positie': p?.naam || '—',
        'Sectie': p?.sectie || '—',
        'Incheck tijd': c?.inTijd || '',
        'Uitcheck tijd': c?.uitTijd || '',
        'Status': statusLabel,
        'Opmerking bij uitchecken': c?.opmerking || '',
      };
    }).sort((a,b) => a['Werknemer'].localeCompare(b['Werknemer']));

    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [
      {wch:24}, // Werknemer
      {wch:20}, // Organisatie
      {wch:24}, // Positie
      {wch:20}, // Sectie
      {wch:12}, // Incheck tijd
      {wch:12}, // Uitcheck tijd
      {wch:14}, // Status
      {wch:40}, // Opmerking
    ];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Checktijden');
    XLSX.writeFile(wb, `${state.event.name.replace(/\s+/g,'_')}_checktijden.xlsx`);
  };

  return (
    <div style={{display:'grid', gap:20}}>
      <Card>
        <h3 style={{marginTop:0, fontFamily:'var(--display)'}}>Inzetlijst</h3>
        <p style={{fontSize:13.5, color:'#5a5645'}}>Alle posities en secties alfabetisch, in twee kolommen op A4, met werknemer, leiding-aanduiding en portofoon-vinkje per positie — net als het Scorpions Security format.</p>
        <Button onClick={exportTotaaloverzicht} disabled={state.posities.length===0}>Exporteer inzetlijst (.pdf)</Button>
      </Card>

      <Card>
        <h3 style={{marginTop:0, fontFamily:'var(--display)'}}>Inzetformulier per sectie</h3>
        <p style={{fontSize:13.5, color:'#5a5645'}}>
          Eén PDF met een pagina per sectie ({Object.keys(sectieGroepen).length || 0} secties gevonden), in het Scorpions Security formaat:
          links alle leidinggevenden van de hele dag (over alle secties), rechts alle werknemers in de eigen sectie, plus checklist en feedbackvelden.
          Teksten hiervan zijn aan te passen in de tab Edit.
        </p>
        <Button onClick={exportWedstrijdformulieren} disabled={state.posities.length===0}>Exporteer inzetformulier (.pdf)</Button>
      </Card>

      <Card>
        <h3 style={{marginTop:0, fontFamily:'var(--display)'}}>Incheck- en uitchecktijden</h3>
        <p style={{fontSize:13.5, color:'#5a5645'}}>Overzicht van alle werknemers met hun in- en uitchecktijd, status en eventuele opmerking, op naam gesorteerd, als Excel-bestand om te controleren of alles klopt.</p>
        <Button onClick={exportChecktijden} disabled={state.indelingen.length===0}>Exporteer checktijden (.xlsx)</Button>
      </Card>
    </div>
  );
}

// ---------- Edit tab ----------
function EditTab({instellingen, setState}){
  const update = (patch) => setState(s => ({...s, instellingen: {...s.instellingen, ...patch}}));

  const [newItem, setNewItem] = useState('');
  const [newMateriaal, setNewMateriaal] = useState('');

  const updateChecklistItem = (idx, value) => {
    const items = [...instellingen.checklistItems];
    items[idx] = value;
    update({checklistItems: items});
  };
  const removeChecklistItem = (idx) => {
    update({checklistItems: instellingen.checklistItems.filter((_,i)=>i!==idx)});
  };
  const addChecklistItem = () => {
    if(!newItem.trim()) return;
    update({checklistItems: [...instellingen.checklistItems, newItem.trim()]});
    setNewItem('');
  };

  return (
    <div style={{display:'grid', gap:20}}>
      <Card>
        <h3 style={{marginTop:0, fontFamily:'var(--display)'}}>Vaste labels op het inzetformulier</h3>
        <p style={{fontSize:12.5, color:'#5a5645', marginTop:-8}}>Het Scorpions Security logo staat vast linksboven op elk formulier.</p>
        <Field label="Label 'Algemeen' blok">
          <input style={inputStyle} value={instellingen.algemeenLabel} onChange={e=>update({algemeenLabel:e.target.value})} />
        </Field>
        <Field label="Label voor 'Evenement/wedstrijd' veld">
          <input style={inputStyle} value={instellingen.naamLabel} onChange={e=>update({naamLabel:e.target.value})} />
        </Field>
        <Field label="Titel linkerkolom (leidinggevenden)">
          <input style={inputStyle} value={instellingen.leidinggevendenTitel} onChange={e=>update({leidinggevendenTitel:e.target.value})} />
        </Field>
        <Field label="Titel rechterkolom (werknemers in het vak)">
          <input style={inputStyle} value={instellingen.werknemersTitel} onChange={e=>update({werknemersTitel:e.target.value})} />
        </Field>
        <Field label="Titel extern feedbackvlak">
          <input style={inputStyle} value={instellingen.feedbackTitelExtern} onChange={e=>update({feedbackTitelExtern:e.target.value})} />
        </Field>
        <Field label="Titel intern feedbackvlak">
          <input style={inputStyle} value={instellingen.feedbackTitelIntern} onChange={e=>update({feedbackTitelIntern:e.target.value})} />
        </Field>
      </Card>

      <Card>
        <h3 style={{marginTop:0, fontFamily:'var(--display)'}}>Checklist voor de wedstrijd</h3>
        <div style={{display:'grid', gap:8, marginBottom:14}}>
          {instellingen.checklistItems.map((item, idx) => (
            <div key={idx} style={{display:'flex', gap:8}}>
              <input style={inputStyle} value={item} onChange={e=>updateChecklistItem(idx, e.target.value)} />
              <Button variant="danger" onClick={()=>removeChecklistItem(idx)}>Verwijderen</Button>
            </div>
          ))}
          {instellingen.checklistItems.length===0 && <div style={{color:'#8a8472'}}>Geen checklist-items.</div>}
        </div>
        <div style={{display:'flex', gap:8}}>
          <input style={inputStyle} placeholder="Nieuw checklist-item" value={newItem} onChange={e=>setNewItem(e.target.value)} />
          <Button onClick={addChecklistItem}>Toevoegen</Button>
        </div>
      </Card>

      <Card>
        <h3 style={{marginTop:0, fontFamily:'var(--display)'}}>Materiaal-macrolijst (snelkeuze bij in-/uitchecken)</h3>
        <p style={{fontSize:13, color:'#5a5645', marginTop:0}}>Deze opties verschijnen als genummerde knoppen bij het in- en uitchecken aan de balie, naast het materiaal dat al automatisch per positie wordt voorgesteld.</p>
        <div style={{display:'grid', gap:8, marginBottom:14}}>
          {(instellingen.materiaalOpties||[]).map((item, idx) => (
            <div key={idx} style={{display:'flex', gap:8, alignItems:'center'}}>
              <div style={{width:24, textAlign:'right', fontSize:13, color:'#8a8472'}}>{idx+1}.</div>
              <input style={inputStyle} value={item} onChange={e=>{
                const items = [...(instellingen.materiaalOpties||[])];
                items[idx] = e.target.value;
                update({materiaalOpties: items});
              }} />
              <Button variant="danger" onClick={()=>update({materiaalOpties:(instellingen.materiaalOpties||[]).filter((_,i)=>i!==idx)})}>Verwijderen</Button>
            </div>
          ))}
          {(!instellingen.materiaalOpties || instellingen.materiaalOpties.length===0) && <div style={{color:'#8a8472'}}>Geen materiaalopties.</div>}
        </div>
        <div style={{display:'flex', gap:8}}>
          <input style={inputStyle} placeholder="Nieuw materiaal" value={newMateriaal} onChange={e=>setNewMateriaal(e.target.value)} />
          <Button onClick={()=>{ if(newMateriaal.trim()){ update({materiaalOpties:[...(instellingen.materiaalOpties||[]), newMateriaal.trim()]}); setNewMateriaal(''); } }}>Toevoegen</Button>
        </div>
      </Card>
    </div>
  );
}


function DataTab({state, setState, exportJSON, importJSONFile, laatsteAutosave}){
  const fileRef = useRef(null);

  const totaalIndelingen = state.indelingen.length;
  const ingecheckt = state.checkins.filter(c=>c.status==='ingecheckt').length;
  const uitgecheckt = state.checkins.filter(c=>c.status==='uitgecheckt').length;
  const noShow = state.checkins.filter(c=>c.status==='no-show').length;
  const nogTeGaan = totaalIndelingen - ingecheckt - uitgecheckt - noShow;

  return (
    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:24}}>
      <Card>
        <h3 style={{marginTop:0, fontFamily:'var(--display)'}}>Evenement</h3>
        <Field label="Evenement / wedstrijd">
          <input style={inputStyle} value={state.event.name} onChange={e=>setState(s=>({...s, event:{...s.event, name:e.target.value}}))} />
        </Field>
        <Field label="Datum">
          <input style={inputStyle} type="date" value={state.event.date} onChange={e=>setState(s=>({...s, event:{...s.event, date:e.target.value}}))} />
        </Field>
      </Card>

      <Card>
        <h3 style={{marginTop:0, fontFamily:'var(--display)'}}>Bewaren & laden</h3>
        <p style={{fontSize:13.5, color:'#5a5645'}}>
          Elke 5 minuten wordt automatisch een back-upbestand gedownload zodra er data is.
          {laatsteAutosave ? <> Laatste autosave: <strong>{laatsteAutosave}</strong>.</> : ' Nog geen autosave geweest in deze sessie.'}
          {' '}Exporteer ook handmatig als je zeker wilt zijn, en laad een bestand weer in om verder te gaan op een ander moment.
        </p>
        <div style={{display:'flex', gap:10, marginTop:10}}>
          <Button onClick={exportJSON}>Exporteer data (.json)</Button>
          <Button variant="ghost" onClick={()=>fileRef.current.click()}>Importeer data</Button>
          <input ref={fileRef} type="file" accept=".json" style={{display:'none'}}
            onChange={e=>{ if(e.target.files[0]) importJSONFile(e.target.files[0]); e.target.value=''; }} />
        </div>
      </Card>

      <Card style={{gridColumn:'1 / -1'}}>
        <h3 style={{marginTop:0, fontFamily:'var(--display)'}}>Overzicht</h3>
        <div style={{display:'flex', gap:24, flexWrap:'wrap', fontSize:14, marginBottom:16}}>
          <div><strong>{state.posities.length}</strong> posities</div>
          <div><strong>{state.werknemers.length}</strong> werknemers</div>
          <div><strong>{totaalIndelingen}</strong> indelingen</div>
        </div>
        <div style={{display:'flex', gap:10, flexWrap:'wrap'}}>
          <Pill tone="ok">{ingecheckt} ingecheckt</Pill>
          <Pill tone="signal">{Math.max(nogTeGaan,0)} nog niet ingecheckt</Pill>
          <Pill>{uitgecheckt} uitgecheckt</Pill>
          {noShow > 0 && <Pill tone="warn">{noShow} no-show</Pill>}
        </div>
      </Card>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
